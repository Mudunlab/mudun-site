# ============================================================================
#  Mudun — Content admin configuration (Sveltia CMS)
#  This file controls what you see and edit at  mudunlab.org/admin
# ============================================================================

backend:
  name: github
  # >>> EDIT THIS ONE LINE in Stage B: replace with  your-github-username/mudun-site
  repo: Mudunlab/mudun-site
  branch: main
  base_url: https://sveltia-cms-auth.ahmad-a-kawaldeh.workers.dev

# Where uploaded PDFs and images are stored in the repo, and their URL on the site
media_folder: "src/uploads"
public_folder: "/uploads"

# Friendlier date display
locale: "en"

collections:
  # --------------------------------------------------------------------------
  #  RESEARCH  —  the formal, two-layer studies
  # --------------------------------------------------------------------------
  - name: "research"
    label: "Research"
    label_singular: "Research study"
    folder: "src/research"
    create: true
    identifier_field: "title_en"
    slug: "{{slug}}"
    summary: "{{title_en}}"
    fields:
      - { label: "Title (English)", name: "title_en", widget: "string" }
      - { label: "Title (Arabic)", name: "title_ar", widget: "string" }
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - { label: "Mobility", value: "mobility" }
          - { label: "Walkability", value: "walk" }
          - { label: "Public space", value: "public" }
          - { label: "Housing", value: "housing" }
          - { label: "Transit", value: "transit" }
      - label: "Status"
        name: "status"
        widget: "select"
        default: "published"
        hint: "‘In preparation’ shows a placeholder card; ‘Published’ shows the full brief."
        options:
          - { label: "Published", value: "published" }
          - { label: "In preparation", value: "preparation" }
      - { label: "Featured", name: "featured", widget: "boolean", default: false, hint: "Adds a ‘Featured’ tag." }
      - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "One-line summary (English)", name: "why_en", widget: "string", hint: "The teaser shown on the card." }
      - { label: "One-line summary (Arabic)", name: "why_ar", widget: "string" }
      - { label: "Brief — why it matters (English)", name: "brief_en", widget: "text", required: false }
      - { label: "Brief — why it matters (Arabic)", name: "brief_ar", widget: "text", required: false }
      - { label: "What this study examines (English)", name: "examines_en", widget: "list", required: false, hint: "Add one point per line." }
      - { label: "What this study examines (Arabic)", name: "examines_ar", widget: "list", required: false }
      - { label: "Cover image", name: "cover", widget: "image", required: false, hint: "Optional. Replaces the placeholder figure." }
      - { label: "Full study (PDF)", name: "pdf", widget: "file", required: false, hint: "The complete study — Layer 2." }

  # --------------------------------------------------------------------------
  #  MAGAZINE  —  the lighter essays, opinion, and photography
  # --------------------------------------------------------------------------
  - name: "magazine"
    label: "Magazine"
    label_singular: "Magazine piece"
    folder: "src/magazine"
    create: true
    identifier_field: "title_en"
    slug: "{{slug}}"
    summary: "{{title_en}}"
    fields:
      - { label: "Title (English)", name: "title_en", widget: "string" }
      - { label: "Title (Arabic)", name: "title_ar", widget: "string" }
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - { label: "Photography", value: "photo" }
          - { label: "Essays", value: "essay" }
          - { label: "Opinion", value: "opinion" }
          - { label: "City life", value: "life" }
      - label: "Status"
        name: "status"
        widget: "select"
        default: "published"
        options:
          - { label: "Published", value: "published" }
          - { label: "In preparation", value: "preparation" }
      - { label: "Featured", name: "featured", widget: "boolean", default: false }
      - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "One-line summary (English)", name: "why_en", widget: "string" }
      - { label: "One-line summary (Arabic)", name: "why_ar", widget: "string" }
      - { label: "The piece (English)", name: "brief_en", widget: "text", required: false }
      - { label: "The piece (Arabic)", name: "brief_ar", widget: "text", required: false }
      - { label: "Cover image", name: "cover", widget: "image", required: false }
